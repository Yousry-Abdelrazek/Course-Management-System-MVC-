version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: cms_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Yousry@#1234}
      MYSQL_DATABASE: CourseManagementDBMVC
    ports:
      - "3307:3306"
    volumes:
      - cms_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-Yousry@#1234}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cms_net

  app:
    build: .
    container_name: cms_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/CourseManagementDBMVC?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Yousry@#1234}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_SEED_DATA: "true"
    ports:
      - "8080:8080"
    networks:
      - cms_net

volumes:
  cms_mysql_data:

networks:
  cms_net:
    driver: bridge
