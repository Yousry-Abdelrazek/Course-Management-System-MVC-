<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Instructor Form', 'instructors', ~{::content})}">
<body>
<th:block th:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i></a></li>
            <li class="breadcrumb-item"><a th:href="@{/instructors}">Instructors</a></li>
            <li class="breadcrumb-item active" aria-current="page"
                th:text="${instructor.id != null} ? 'Edit' : 'Create'">Create</li>
        </ol>
    </nav>

    <h1 class="h3 mb-4" th:text="${instructor.id != null} ? 'Edit Instructor' : 'Create Instructor'">Create Instructor</h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${instructor.id != null} ? @{/instructors/{id}(id=${instructor.id})} : @{/instructors}"
                  th:object="${instructor}" method="post" novalidate>

                <div class="mb-3">
                    <label class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    <textarea class="form-control" rows="4" th:field="*{bio}"
                              th:classappend="${#fields.hasErrors('bio')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}">Error</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button>
                    <a th:href="@{/instructors}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</th:block>
</body>
</html>
