<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Instructor Details', 'instructors', ~{::content})}">
<body>
<th:block th:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i></a></li>
            <li class="breadcrumb-item"><a th:href="@{/instructors}">Instructors</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${instructor.name}">Name</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0" th:text="${instructor.name}">Name</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/instructors/{id}/edit(id=${instructor.id})}" class="btn btn-outline-primary"><i class="bi bi-pencil me-1"></i>Edit</a>
            <a th:href="@{/instructors}" class="btn btn-outline-secondary">Back</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">ID</dt>
                <dd class="col-sm-9" th:text="${instructor.id}">1</dd>
                <dt class="col-sm-3">Name</dt>
                <dd class="col-sm-9" th:text="${instructor.name}">Name</dd>
                <dt class="col-sm-3">Email</dt>
                <dd class="col-sm-9" th:text="${instructor.email}">email</dd>
                <dt class="col-sm-3">Active Courses</dt>
                <dd class="col-sm-9"><span class="badge bg-secondary" th:text="${instructor.courseCount}">0</span></dd>
                <dt class="col-sm-3">Bio</dt>
                <dd class="col-sm-9" th:text="${instructor.bio} ?: '—'">Bio</dd>
            </dl>
        </div>
    </div>

</th:block>
</body>
</html>
