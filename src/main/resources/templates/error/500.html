<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="text-center">
    <i class="bi bi-exclamation-octagon display-1 text-danger mb-3"></i>
    <h1 class="display-4 fw-bold">500</h1>
    <p class="fs-5 text-muted" th:text="${message} ?: 'An unexpected error occurred.'">Server error.</p>
    <p class="small text-muted" th:if="${detail}" th:text="${detail}"></p>
    <a th:href="@{/dashboard}" class="btn btn-primary mt-2"><i class="bi bi-house-door me-1"></i>Back to Dashboard</a>
</div>
</body>
</html>
