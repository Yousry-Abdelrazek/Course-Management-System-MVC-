<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, active, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ? ${title} + ' | Course Management System' : 'Course Management System'">Course Management System</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="cms-wrapper">
    <!-- Sidebar -->
    <nav th:replace="~{fragments/sidebar :: sidebar(${active})}"></nav>

    <div class="cms-main">
        <!-- Top navbar -->
        <nav th:replace="~{fragments/navbar :: navbar}"></nav>

        <main class="cms-content p-4">
            <!-- Flash / alert messages -->
            <div th:replace="~{fragments/alerts :: alerts}"></div>

            <!-- Page content injected here -->
            <th:block th:replace="${content}"></th:block>
        </main>

        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
