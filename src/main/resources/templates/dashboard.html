<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Dashboard', 'dashboard', ~{::content})}">
<body>
<th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Dashboard</h1>
            <p class="text-muted mb-0">Overview of your course management platform</p>
        </div>
    </div>

    <!-- Stat cards -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="card stat-card h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-person-badge"></i></div>
                    <div>
                        <div class="text-muted small">Instructors</div>
                        <div class="h4 mb-0" th:text="${stats.instructorCount}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card stat-card h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-journal-bookmark"></i></div>
                    <div>
                        <div class="text-muted small">Courses</div>
                        <div class="h4 mb-0" th:text="${stats.courseCount}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card stat-card h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-people"></i></div>
                    <div>
                        <div class="text-muted small">Students</div>
                        <div class="h4 mb-0" th:text="${stats.studentCount}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card stat-card h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-icon bg-info bg-opacity-10 text-info"><i class="bi bi-card-checklist"></i></div>
                    <div>
                        <div class="text-muted small">Active Enrollments</div>
                        <div class="h4 mb-0" th:text="${stats.activeEnrollmentCount}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <!-- Recent courses -->
        <div class="col-lg-6">
            <div class="card h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold"><i class="bi bi-journal-bookmark me-2 text-success"></i>Recent Courses</span>
                    <a th:href="@{/courses}" class="btn btn-sm btn-outline-secondary">View all</a>
                </div>
                <div class="card-body p-0">
                    <div th:if="${stats.recentCourses.isEmpty()}"
                         th:replace="~{fragments/components :: emptyState('bi-journal-x', 'No courses yet.', @{/courses/new}, 'Add Course')}"></div>
                    <table th:unless="${stats.recentCourses.isEmpty()}" class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                        <tr><th>Title</th><th>Instructor</th><th class="text-end">Price</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${stats.recentCourses}">
                            <td><a th:href="@{/courses/{id}(id=${c.id})}" th:text="${c.title}" class="text-decoration-none">Title</a></td>
                            <td th:text="${c.instructorName} ?: '—'">—</td>
                            <td class="text-end" th:text="'$' + ${#numbers.formatDecimal(c.price, 1, 2)}">$0.00</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Recent students -->
        <div class="col-lg-6">
            <div class="card h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold"><i class="bi bi-people me-2 text-warning"></i>Recent Students</span>
                    <a th:href="@{/students}" class="btn btn-sm btn-outline-secondary">View all</a>
                </div>
                <div class="card-body p-0">
                    <div th:if="${stats.recentStudents.isEmpty()}"
                         th:replace="~{fragments/components :: emptyState('bi-person-x', 'No students yet.', @{/students/new}, 'Add Student')}"></div>
                    <table th:unless="${stats.recentStudents.isEmpty()}" class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                        <tr><th>Name</th><th>Email</th><th class="text-end">Joined</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="s : ${stats.recentStudents}">
                            <td><a th:href="@{/students/{id}(id=${s.id})}" th:text="${s.name}" class="text-decoration-none">Name</a></td>
                            <td th:text="${s.email}">email</td>
                            <td class="text-end" th:text="${s.joinedOn} != null ? ${#temporals.format(s.joinedOn, 'dd MMM yyyy')} : '—'">—</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
