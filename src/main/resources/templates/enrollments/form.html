<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('New Enrollment', 'enrollments', ~{::content})}">
<body>
<th:block th:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i></a></li>
            <li class="breadcrumb-item"><a th:href="@{/enrollments}">Enrollments</a></li>
            <li class="breadcrumb-item active" aria-current="page">Create</li>
        </ol>
    </nav>

    <h1 class="h3 mb-4">Create Enrollment</h1>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/enrollments}" th:object="${enrollment}" method="post" novalidate>

                <div class="mb-3">
                    <label class="form-label">Student <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{studentId}"
                            th:classappend="${#fields.hasErrors('studentId')} ? 'is-invalid'">
                        <option value="">— Select a student —</option>
                        <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name} + ' (' + ${s.email} + ')'">Student</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('studentId')}" th:errors="*{studentId}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Course <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{courseId}"
                            th:classappend="${#fields.hasErrors('courseId')} ? 'is-invalid'">
                        <option value="">— Select a course —</option>
                        <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.title}">Course</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('courseId')}" th:errors="*{courseId}">Error</div>
                </div>

                <div class="alert alert-info small">
                    <i class="bi bi-info-circle me-1"></i>
                    Enrollment respects the course registration window. A student can only enroll once per course,
                    and cannot enroll into a deleted course.
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Enroll</button>
                    <a th:href="@{/enrollments}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</th:block>
</body>
</html>
