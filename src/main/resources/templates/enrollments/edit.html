<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Edit Enrollment', 'enrollments', ~{::content})}">
<body>
<th:block th:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i></a></li>
            <li class="breadcrumb-item"><a th:href="@{/enrollments}">Enrollments</a></li>
            <li class="breadcrumb-item active" aria-current="page">Edit</li>
        </ol>
    </nav>

    <h1 class="h3 mb-4">Edit Enrollment</h1>

    <div class="card">
        <div class="card-body">
            <dl class="row mb-4">
                <dt class="col-sm-3">Student</dt>
                <dd class="col-sm-9" th:text="${detail.studentName}">Student</dd>
                <dt class="col-sm-3">Course</dt>
                <dd class="col-sm-9" th:text="${detail.courseTitle}">Course</dd>
            </dl>

            <form th:action="@{/enrollments/{id}(id=${detail.id})}" th:object="${enrollment}" method="post" novalidate>

                <div class="mb-3">
                    <label class="form-label">Grade</label>
                    <input type="text" class="form-control" th:field="*{grade}" placeholder="e.g. A, B+"
                           th:classappend="${#fields.hasErrors('grade')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('grade')}" th:errors="*{grade}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Progress (0-100) <span class="text-danger">*</span></label>
                    <input type="number" min="0" max="100" class="form-control" th:field="*{progress}"
                           th:classappend="${#fields.hasErrors('progress')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('progress')}" th:errors="*{progress}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{status}"
                            th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'">
                        <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}">STATUS</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Error</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button>
                    <a th:href="@{/enrollments}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</th:block>
</body>
</html>
