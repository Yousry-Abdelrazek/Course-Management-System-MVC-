<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Enrollment Details', 'enrollments', ~{::content})}">
<body>
<th:block th:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i></a></li>
            <li class="breadcrumb-item"><a th:href="@{/enrollments}">Enrollments</a></li>
            <li class="breadcrumb-item active" aria-current="page">Details</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Enrollment Details</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/enrollments/{id}/edit(id=${enrollment.id})}" class="btn btn-outline-primary"><i class="bi bi-pencil me-1"></i>Edit</a>
            <a th:href="@{/enrollments}" class="btn btn-outline-secondary">Back</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Student</dt>
                <dd class="col-sm-9"><a th:href="@{/students/{id}(id=${enrollment.studentId})}" th:text="${enrollment.studentName}" class="text-decoration-none">Student</a></dd>
                <dt class="col-sm-3">Course</dt>
                <dd class="col-sm-9"><a th:href="@{/courses/{id}(id=${enrollment.courseId})}" th:text="${enrollment.courseTitle}" class="text-decoration-none">Course</a></dd>
                <dt class="col-sm-3">Enrolled On</dt>
                <dd class="col-sm-9" th:text="${enrollment.enrolledOn} != null ? ${#temporals.format(enrollment.enrolledOn, 'dd MMM yyyy')} : '—'">—</dd>
                <dt class="col-sm-3">Grade</dt>
                <dd class="col-sm-9" th:text="${enrollment.grade} ?: '—'">—</dd>
                <dt class="col-sm-3">Progress</dt>
                <dd class="col-sm-9">
                    <div class="progress" style="height: 20px; max-width: 300px;">
                        <div class="progress-bar" role="progressbar"
                             th:style="'width:' + ${enrollment.progress} + '%'"
                             th:text="${enrollment.progress} + '%'">0%</div>
                    </div>
                </dd>
                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9">
                    <span class="badge"
                          th:classappend="${enrollment.status.name() == 'ACTIVE'} ? 'bg-success' : (${enrollment.status.name() == 'COMPLETED'} ? 'bg-primary' : 'bg-secondary')"
                          th:text="${enrollment.status}">STATUS</span>
                </dd>
            </dl>
        </div>
    </div>

</th:block>
</body>
</html>
