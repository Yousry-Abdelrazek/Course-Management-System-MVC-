<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Student Enrollments', 'students', ~{::content})}">
<body>
<th:block th:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i></a></li>
            <li class="breadcrumb-item"><a th:href="@{/students}">Students</a></li>
            <li class="breadcrumb-item"><a th:href="@{/students/{id}(id=${student.id})}" th:text="${student.name}">Name</a></li>
            <li class="breadcrumb-item active" aria-current="page">Enrollments</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Enrollments &mdash; <span th:text="${student.name}">Name</span></h1>
        <a th:href="@{/enrollments/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Enrollment</a>
    </div>

    <div class="card">
        <div class="card-body">
            <div th:if="${page.isEmpty()}"
                 th:replace="~{fragments/components :: emptyState('bi-inbox', 'This student has no enrollments yet.', @{/enrollments/new}, 'Enroll')}"></div>

            <div th:unless="${page.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Course</th>
                        <th>Enrolled On</th>
                        <th>Grade</th>
                        <th>Progress</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e : ${page.content}">
                        <td><a th:href="@{/courses/{id}(id=${e.courseId})}" th:text="${e.courseTitle}" class="text-decoration-none">Course</a></td>
                        <td th:text="${e.enrolledOn} != null ? ${#temporals.format(e.enrolledOn, 'dd MMM yyyy')} : '—'">—</td>
                        <td th:text="${e.grade} ?: '—'">—</td>
                        <td>
                            <div class="progress" style="height: 18px; min-width: 90px;">
                                <div class="progress-bar" role="progressbar"
                                     th:style="'width:' + ${e.progress} + '%'"
                                     th:text="${e.progress} + '%'"
                                     th:aria-valuenow="${e.progress}" aria-valuemin="0" aria-valuemax="100">0%</div>
                            </div>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${e.status.name() == 'ACTIVE'} ? 'bg-success' : (${e.status.name() == 'COMPLETED'} ? 'bg-primary' : 'bg-secondary')"
                                  th:text="${e.status}">STATUS</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/enrollments/{id}/edit(id=${e.id})}" class="btn btn-sm btn-outline-primary" title="Edit"><i class="bi bi-pencil"></i></a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:unless="${page.isEmpty()}" class="mt-3"
                 th:replace="~{fragments/components :: pagination(${page}, '/students/' + ${student.id} + '/enrollments', null)}"></div>
        </div>
    </div>

</th:block>
</body>
</html>
