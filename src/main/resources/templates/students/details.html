<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Student Details', 'students', ~{::content})}">
<body>
<th:block th:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i></a></li>
            <li class="breadcrumb-item"><a th:href="@{/students}">Students</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${student.name}">Name</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0" th:text="${student.name}">Name</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/students/{id}/enrollments(id=${student.id})}" class="btn btn-outline-info"><i class="bi bi-card-checklist me-1"></i>Enrollments</a>
            <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-outline-primary"><i class="bi bi-pencil me-1"></i>Edit</a>
            <a th:href="@{/students}" class="btn btn-outline-secondary">Back</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">ID</dt>
                <dd class="col-sm-9" th:text="${student.id}">1</dd>
                <dt class="col-sm-3">Name</dt>
                <dd class="col-sm-9" th:text="${student.name}">Name</dd>
                <dt class="col-sm-3">Email</dt>
                <dd class="col-sm-9" th:text="${student.email}">email</dd>
                <dt class="col-sm-3">Joined On</dt>
                <dd class="col-sm-9" th:text="${student.joinedOn} != null ? ${#temporals.format(student.joinedOn, 'dd MMM yyyy')} : '—'">—</dd>
                <dt class="col-sm-3">Enrollments</dt>
                <dd class="col-sm-9"><span class="badge bg-info" th:text="${student.enrollmentCount}">0</span></dd>
            </dl>
        </div>
    </div>

</th:block>
</body>
</html>
