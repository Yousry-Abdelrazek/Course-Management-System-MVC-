<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Students', 'students', ~{::content})}">
<body>
<th:block th:fragment="content">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-house-door"></i></a></li>
            <li class="breadcrumb-item active" aria-current="page">Students</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Students</h1>
        <a th:href="@{/students/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Student</a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/students}" method="get" class="row g-2 mb-3">
                <div class="col-md-6 col-lg-4">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" name="query" class="form-control" placeholder="Search by name or email" th:value="${query}">
                        <button class="btn btn-outline-secondary" type="submit">Search</button>
                        <a th:href="@{/students}" class="btn btn-outline-secondary" th:if="${query}">Clear</a>
                    </div>
                </div>
            </form>

            <div th:if="${page.isEmpty()}"
                 th:replace="~{fragments/components :: emptyState('bi-person-x', 'No students found.', @{/students/new}, 'Add Student')}"></div>

            <div th:unless="${page.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th><a class="sortable" th:href="@{/students(sort='name,asc', query=${query})}">Name <i class="bi bi-arrow-down-up small"></i></a></th>
                        <th><a class="sortable" th:href="@{/students(sort='email,asc', query=${query})}">Email <i class="bi bi-arrow-down-up small"></i></a></th>
                        <th><a class="sortable" th:href="@{/students(sort='joinedOn,desc', query=${query})}">Joined <i class="bi bi-arrow-down-up small"></i></a></th>
                        <th class="text-center">Enrollments</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${page.content}">
                        <td><a th:href="@{/students/{id}(id=${s.id})}" th:text="${s.name}" class="text-decoration-none fw-medium">Name</a></td>
                        <td th:text="${s.email}">email</td>
                        <td th:text="${s.joinedOn} != null ? ${#temporals.format(s.joinedOn, 'dd MMM yyyy')} : '—'">—</td>
                        <td class="text-center"><span class="badge bg-info" th:text="${s.enrollmentCount}">0</span></td>
                        <td class="text-end">
                            <a th:href="@{/students/{id}(id=${s.id})}" class="btn btn-sm btn-outline-secondary" title="View"><i class="bi bi-eye"></i></a>
                            <a th:href="@{/students/{id}/enrollments(id=${s.id})}" class="btn btn-sm btn-outline-info" title="Enrollments"><i class="bi bi-card-checklist"></i></a>
                            <a th:href="@{/students/{id}/edit(id=${s.id})}" class="btn btn-sm btn-outline-primary" title="Edit"><i class="bi bi-pencil"></i></a>
                            <button type="button" class="btn btn-sm btn-outline-danger" title="Delete"
                                    data-bs-toggle="modal" th:data-bs-target="'#delModal' + ${s.id}"><i class="bi bi-trash"></i></button>
                            <div th:replace="~{fragments/components :: confirmModal('delModal' + ${s.id}, 'Delete Student', 'Are you sure you want to delete ' + ${s.name} + '?', @{/students/{id}/delete(id=${s.id})})}"></div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:unless="${page.isEmpty()}" class="mt-3"
                 th:replace="~{fragments/components :: pagination(${page}, '/students', ${query})}"></div>
        </div>
    </div>

</th:block>
</body>
</html>
