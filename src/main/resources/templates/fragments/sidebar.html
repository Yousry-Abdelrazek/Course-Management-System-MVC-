<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="sidebar(active)" class="cms-sidebar text-white">
    <div class="cms-brand px-3 py-4 d-flex align-items-center gap-2">
        <i class="bi bi-mortarboard-fill fs-3"></i>
        <span class="fs-5 fw-semibold">CMS Admin</span>
    </div>
    <ul class="nav flex-column px-2">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'dashboard'} ? 'active' : ''" th:href="@{/dashboard}">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'instructors'} ? 'active' : ''" th:href="@{/instructors}">
                <i class="bi bi-person-badge me-2"></i> Instructors
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'courses'} ? 'active' : ''" th:href="@{/courses}">
                <i class="bi bi-journal-bookmark me-2"></i> Courses
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'students'} ? 'active' : ''" th:href="@{/students}">
                <i class="bi bi-people me-2"></i> Students
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active == 'enrollments'} ? 'active' : ''" th:href="@{/enrollments}">
                <i class="bi bi-card-checklist me-2"></i> Enrollments
            </a>
        </li>
    </ul>
</nav>
</body>
</html>
