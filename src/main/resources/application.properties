spring.application.name=Course Management System MVC
server.port=8080

# ---------------------------------------------------------------------------
# Datasource (MySQL). Override via environment variables in Docker.
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/CourseManagementDBMVC?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Yousry@#1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------------------------------------------------------------------------
# Thymeleaf
# ---------------------------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ---------------------------------------------------------------------------
# Web / MVC
# ---------------------------------------------------------------------------
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
spring.mvc.problemdetails.enabled=false

# Pagination guard: cap requested page size to prevent dumping huge tables
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=10

# Seed sample data on startup (set to false to disable)
app.seed-data=true

# ---------------------------------------------------------------------------
# Error handling: let @ControllerAdvice + custom error pages take over
# ---------------------------------------------------------------------------
server.error.whitelabel.enabled=false
server.error.path=/error
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# Use cookie-based sessions only (no jsessionid in URL) so flash attributes survive redirects
server.servlet.session.tracking-modes=cookie
